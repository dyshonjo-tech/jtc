<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Chillroom — nighttime vibe</title>
<style>
  :root { --paper:#eae6f0; --accent:#7cd1ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#0a0b12; }
  canvas { display:block; }

  #hud {
    position:fixed; left:18px; top:16px; z-index:10; pointer-events:none; user-select:none;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; color:var(--paper);
    text-shadow:0 1px 3px rgba(0,0,0,.7);
  }
  #hud .title { font-size:13px; letter-spacing:.2em; text-transform:uppercase; opacity:.92; }
  #hud .sub   { font-size:11px; letter-spacing:.04em; opacity:.5; margin-top:4px; }

  #dock {
    position:fixed; left:50%; bottom:16px; transform:translateX(-50%); z-index:10;
    display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;
    max-width:94vw; font-family:ui-monospace,monospace; font-size:11px; color:var(--paper);
  }
  .btn, #urlbox {
    pointer-events:auto; background:rgba(20,22,34,.72); border:1px solid rgba(124,209,255,.3);
    color:var(--paper); padding:8px 12px; border-radius:9px; letter-spacing:.05em;
    backdrop-filter:blur(8px); transition:border-color .15s, background .15s;
  }
  .btn { cursor:pointer; user-select:none; }
  .btn:hover { border-color:var(--accent); background:rgba(30,34,52,.85); }
  .btn.icon { font-size:13px; min-width:34px; text-align:center; }
  #urlbox { width:190px; outline:none; }
  #urlbox::placeholder { color:rgba(234,230,240,.4); }
  #file { display:none; }
  #status {
    position:fixed; left:50%; bottom:58px; transform:translateX(-50%); z-index:10;
    font-family:ui-monospace,monospace; font-size:11px; color:var(--accent);
    opacity:0; transition:opacity .3s; pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,.8);
  }
  #status.show { opacity:.85; }

  #loader {
    position:fixed; inset:0; z-index:20; display:grid; place-items:center; background:#0a0b12;
    color:var(--paper); font-family:ui-monospace,monospace; font-size:12px; letter-spacing:.25em;
    text-transform:uppercase; transition:opacity .5s; }
  #loader.gone { opacity:0; pointer-events:none; }
</style>
<script>
  window.addEventListener("error", function(e){
    var l=document.getElementById("loader");
    if(l && !l.classList.contains("gone")){
      l.textContent = "⚠ " + ((e && e.message) || "load error");
      l.style.cssText += ";font-size:11px;padding:24px;text-align:center;line-height:1.6";
    }
  });
</script>
</head>
<body>
  <div id="loader">setting the mood…</div>
  <div id="hud">
    <div class="title">Chillroom</div>
    <div class="sub">click posters, the PC & screens · drag to look · WASD to move</div>
  </div>
  <div id="status"></div>
  <div id="dock">
    <label class="btn" for="file">⏏ Load file</label>
    <input id="file" type="file" accept="video/*,audio/*" />
    <input id="urlbox" type="text" placeholder="paste a YouTube / video / music link" />
    <span class="btn" id="addurl">Add URL</span>
    <span class="btn icon" id="bplay" title="play">▶</span>
    <span class="btn icon" id="bpause" title="pause">⏸</span>
    <span class="btn icon" id="bstop" title="stop">⏹</span>
  </div>

  <video id="vid" playsinline crossorigin="anonymous" style="display:none"></video>
  <audio id="aud" crossorigin="anonymous" style="display:none"></audio>

    let cssRenderer=null, cssScene=null, tvObject=null;

    // ---------- toon material + inverted-hull outlines ----------
    function toonRamp(steps){
      const d = new Uint8Array(steps);
      for(let i=0;i<steps;i++) d[i] = Math.round((i/(steps-1))*255);
      const t = new THREE.DataTexture(d, steps, 1, THREE.RedFormat);
      t.minFilter = t.magFilter = THREE.NearestFilter; t.needsUpdate = true; return t;
    }
    const ramp = toonRamp(3);
    function toonMat(c){ return new THREE.MeshToonMaterial({ color:new THREE.Color(c), gradientMap:ramp }); }
    const outlineMat = new THREE.MeshBasicMaterial({ color:0x05060a, side:THREE.BackSide });

    function prop(geo, color, outline){
      const g = new THREE.Group();
      const m = new THREE.Mesh(geo, toonMat(color));
      m.castShadow = true; m.receiveShadow = true; g.add(m);
      if (outline !== 0){
        const o = new THREE.Mesh(geo, outlineMat);
        o.scale.multiplyScalar(1 + (outline || 0.04)); g.add(o);
      }
      return g;
    }

    // ---- streaming embeds (YouTube / Dailymotion / Vimeo / generic) on the big screen ----
    function toEmbed(u){
      let m;
      if((m=u.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([\w-]{11})/))) return "https://www.youtube.com/embed/"+m[1]+"?autoplay=1&rel=0";
      if((m=u.match(/youtube\.com\/embed\/([\w-]{11})/)))                                       return u+(u.indexOf("autoplay")>-1?"":(u.indexOf("?")>-1?"&":"?")+"autoplay=1");
      if((m=u.match(/(?:dailymotion\.com\/video\/|dai\.ly\/)([a-zA-Z0-9]+)/)))                  return "https://www.dailymotion.com/embed/video/"+m[1]+"?autoplay=1";
      if((m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/)))                                          return "https://player.vimeo.com/video/"+m[1]+"?autoplay=1";
      return null;
    }
    function showEmbed(src){
      if(!cssRenderer){ status("streaming needs the web module — run it on GitHub Pages, or use a direct .mp4/.mp3 link here"); return; }
      if(activeEl){ activeEl.pause(); activeEl=null; }
      if(!tvObject){

        wrap.style.width="640px"; wrap.style.height="360px"; wrap.style.background="#000"; wrap.style.overflow="hidden";
        const ifr=document.createElement("iframe");

        wrap.appendChild(ifr);

    function drawScreen(t){
      const g=sx.createLinearGradient(0,0,0,sc.height);
      const k=0.5+0.5*Math.sin(t*0.4);
      g.addColorStop(0,`rgb(${40+60*k},${30+20*k},${70+30*k})`);
      g.addColorStop(0.6,`rgb(${120+60*k},${50+30*k},60)`);
      g.addColorStop(1,`rgb(${230*k+20},${120*k+20},60)`);
      sx.fillStyle=g; sx.fillRect(0,0,sc.width,sc.height);
      sx.fillStyle="rgba(255,220,160,0.9)";
      sx.beginPath(); sx.arc(sc.width/2,sc.height*0.55,46,0,Math.PI*2); sx.fill();
      sx.fillStyle="rgba(20,16,30,0.55)";
      for(let i=0;i<5;i++) sx.fillRect(sc.width/2-60,sc.height*0.55+i*9,120,4);
      const bars=16, bw=sc.width/bars;
      for(let i=0;i<bars;i++){
        let h;
        if(mode==="viz"&&analyser){ analyser.getByteFrequencyData(freq); h=(freq[i]/255)*120+6; }
        else h=14+Math.abs(Math.sin(t*3+i*0.6))*46;
        sx.fillStyle="rgba(124,209,255,0.85)"; sx.fillRect(i*bw+3,sc.height-h-8,bw-6,h);
      }
      sx.fillStyle="rgba(255,255,255,0.92)"; sx.font="600 22px ui-monospace, monospace";

      sx.fillStyle="rgba(255,255,255,0.6)"; sx.font="13px ui-monospace, monospace";

  const Asteroids = (function () {

        axx.fillStyle = "#ffe24e"; for (const b of bullets) axx.fillRect(b.x - 1.5, b.y - 1.5, 3, 3);
        if (inv <= 0 || Math.sin(inv * 30) > 0) {
          axx.save(); axx.translate(ship.x, ship.y); axx.rotate(ship.a); axx.strokeStyle = "#9bffd0"; axx.lineWidth = 2;
          axx.beginPath(); axx.moveTo(12, 0); axx.lineTo(-8, -7); axx.lineTo(-4, 0); axx.lineTo(-8, 7); axx.closePath(); axx.stroke();
          if (keys["arrowup"] || keys["w"]) { axx.strokeStyle = "#ff8a5a"; axx.beginPath(); axx.moveTo(-4, 0); axx.lineTo(-12, 0); axx.stroke(); }
          axx.restore();
        }
        if (this.over) center("GAME OVER", H / 2, 22, "#ff5a7a");
      }
    };
  })();

  /* ===== MINESWEEPER ===== */
  const Mines = (function () {
    const N = 9, MINES = 10, cs = 26, ox = 86, oy = 48;
    let grid, cur, dead, win, flags, revealedCount;
    function build() {
      grid = [];
      for (let y = 0; y < N; y++) { grid.push([]); for (let x = 0; x < N; x++) grid[y].push({ m: false, r: false, f: false, n: 0 }); }
      let placed = 0;
      while (placed < MINES) { const x = (Math.random() * N) | 0, y = (Math.random() * N) | 0; if (!grid[y][x].m) { grid[y][x].m = true; placed++; } }
      for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
        if (grid[y][x].m) continue;
        let n = 0;
        for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) { const nx = x + dx, ny = y + dy; if (nx >= 0 && nx < N && ny >= 0 && ny < N && grid[ny][nx].m) n++; }
        grid[y][x].n = n;
      }
    }
    function reveal(x, y) {
      const c = grid[y][x]; if (c.r || c.f) return; c.r = true; revealedCount++;
      if (c.m) { dead = true; return; }
      if (c.n === 0) for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) { const nx = x + dx, ny = y + dy; if (nx >= 0 && nx < N && ny >= 0 && ny < N && !grid[ny][nx].r) reveal(nx, ny); }
    }
    const NCOL = ["", "#7cb0ff", "#7cffd0", "#ffe24e", "#ffb14e", "#ff8a5a", "#ff5a7a", "#ff3df0", "#ffffff"];
    return {
      name: "MINESWEEPER", over: false,
      reset() { cur = { x: 4, y: 4 }; dead = false; win = false; flags = 0; revealedCount = 0; this.over = false; build(); },
      key(k) {
        if (k === "arrowup" || k === "w") cur.y = (cur.y + N - 1) % N;
        else if (k === "arrowdown" || k === "s") cur.y = (cur.y + 1) % N;
        else if (k === "arrowleft" || k === "a") cur.x = (cur.x + N - 1) % N;
        else if (k === "arrowright" || k === "d") cur.x = (cur.x + 1) % N;
        else if (k === "enter" || k === " " || k === "spacebar") { reveal(cur.x, cur.y); if (dead) this.over = true; }
        else if (k === "f") { const c = grid[cur.y][cur.x]; if (!c.r) { c.f = !c.f; flags += c.f ? 1 : -1; } }
        if (!dead && revealedCount === N * N - MINES) { win = true; this.over = true; }
      },
      step() { },
      draw() {
        clear();
        text("MINESWEEPER", 12, 28, 15, "#7cffd0"); text("\u2691 " + (MINES - flags), W - 12, 28, 15, "#ffe24e", "right");
        for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
          const c = grid[y][x], cx = ox + x * cs, cy = oy + y * cs;
          if (c.r) {
            axx.fillStyle = c.m ? "#ff3df0" : "#16223a"; axx.fillRect(cx, cy, cs - 2, cs - 2);
            if (c.m) { axx.fillStyle = "#000"; axx.beginPath(); axx.arc(cx + (cs - 2) / 2, cy + (cs - 2) / 2, 5, 0, 7); axx.fill(); }
            else if (c.n > 0) { axx.fillStyle = NCOL[c.n]; axx.font = "700 15px ui-monospace, monospace"; axx.textAlign = "center"; axx.textBaseline = "middle"; axx.fillText(c.n, cx + (cs - 2) / 2, cy + (cs - 2) / 2 + 1); axx.textBaseline = "alphabetic"; axx.textAlign = "left"; }
          } else {
            axx.fillStyle = "#2c3c5c"; axx.fillRect(cx, cy, cs - 2, cs - 2);
            if (c.f) { axx.fillStyle = "#ff5a7a"; axx.font = "700 14px ui-monospace, monospace"; axx.textAlign = "center"; axx.textBaseline = "middle"; axx.fillText("\u2691", cx + (cs - 2) / 2, cy + (cs - 2) / 2 + 1); axx.textBaseline = "alphabetic"; axx.textAlign = "left"; }
          }
          if (cur.x === x && cur.y === y) { axx.strokeStyle = "#9bffd0"; axx.lineWidth = 2; axx.strokeRect(cx, cy, cs - 2, cs - 2); }
        }
        text("arrows move \u00b7 space reveal \u00b7 F flag", W / 2, H - 8, 11, "rgba(200,220,255,0.5)", "center");
        if (win) center("SWEPT! you win", H / 2, 22, "#ffe24e");
        else if (dead) center("BOOM", H / 2, 22, "#ff5a7a");
      }
    };
  })();

  const games = [Snake, Breakout, Pong, G2048, Asteroids, Mines];

  function drawMenu() {
    clear("#070912");
    center("JTC ARCADE", 52, 30, "#7cffd0");
    axx.fillStyle = "rgba(124,255,208,0.18)"; axx.fillRect(60, 66, W - 120, 2);
    for (let i = 0; i < games.length; i++) {
      const y = 100 + i * 30;
      if (i === sel) { axx.fillStyle = "rgba(124,176,255,0.18)"; axx.fillRect(70, y - 18, W - 140, 26); }
      text((i === sel ? "\u25b8 " : "  ") + games[i].name, 90, y, 18, i === sel ? "#fff" : "#9fb6d8");
    }
    center("Enter to play   \u00b7   Esc to stand up", H - 18, 12, "rgba(200,220,255,0.55)");
  }
  function drawOver() {
    axx.fillStyle = "rgba(4,6,15,0.72)"; axx.fillRect(0, 0, W, H);
    center(game.name, H / 2 - 34, 22, "#fff");
    center("Enter \u2014 play again", H / 2 + 4, 16, "#7cffd0");
    center("Esc \u2014 back to games", H / 2 + 30, 14, "rgba(200,220,255,0.6)");
  }
  function drawAttract(dt) {
    attractT += dt;
    clear("#05070f");
    axx.fillStyle = "rgba(124,176,255,0.5)";
    for (let i = 0; i < 26; i++) { const x = ((i * 53 + attractT * 40) % W), y = (i * 37) % H; axx.fillRect(x, y, 2, 2); }
    center("JTC ARCADE", 110, 34, "#7cffd0");
    center("6 games \u00b7 all original", 145, 14, "#9fb6d8");
    if ((attractT % 1.2) < 0.7) center("\u25b6  CLICK TO PLAY  \u25c0", 200, 18, "#ffe24e");
    center("Snake \u00b7 Breakout \u00b7 Pong \u00b7 2048 \u00b7 Asteroids \u00b7 Mines", H - 16, 11, "rgba(200,220,255,0.5)");
  }

  function engage() { active = true; view = "menu"; sel = 0; seatProg.copy(camera.position); status("ARCADE \u00b7 \u2191/\u2193 pick \u00b7 Enter play \u00b7 Esc stand up"); }
  function stand() {
    active = false;
    player.x = SEAT.pos.x; player.z = SEAT.pos.z;
    cam.yaw = -Math.PI / 2; cam.pitch = 0;
  }
  function click() { if (active) stand(); else engage(); }
  function onKey(k) {
    if (view === "menu") {
      if (k === "arrowup" || k === "w") sel = (sel + games.length - 1) % games.length;
      else if (k === "arrowdown" || k === "s") sel = (sel + 1) % games.length;
      else if (k === "enter") { game = games[sel]; game.reset(); view = "game"; }
      else if (k === "escape") stand();
      return;
    }
    if (k === "escape") { view = "menu"; return; }
    if (game && game.over) { if (k === "enter") game.reset(); return; }
    if (game && game.key) game.key(k);
  }
  function tick(dt) {
    arcadeTex.needsUpdate = true; blink += dt;
    if (arcadeGlow) arcadeGlow.intensity = active ? 1.1 : (0.45 + 0.25 * Math.sin(blink * 3));
    if (active) seatCamera();
    if (!active) { drawAttract(dt); return; }
    if (view === "menu") { drawMenu(); return; }
    if (game) { if (!game.over) game.step(dt); game.draw(); if (game.over) drawOver(); }
  }

  return { engage: engage, stand: stand, click: click, onKey: onKey, tick: tick, get active() { return active; } };
})();
/* ===================== END JTC ARCADE BLOCK ===================== */
    // ---------- controls ----------
    const cam={yaw:Math.PI,pitch:-0.05}, keys={};
    const player=new THREE.Vector3(0,2.3,4.6);
    let dragging=false,lx=0,ly=0,moved=0;
    const el=renderer.domElement;
    el.addEventListener("pointerdown",function(e){ dragging=true; lx=e.clientX; ly=e.clientY; moved=0; el.setPointerCapture(e.pointerId); });
    el.addEventListener("pointerup",function(e){ dragging=false; try{el.releasePointerCapture(e.pointerId);}catch(_){ } if(moved<6) tryClick(e.clientX,e.clientY); });
    el.addEventListener("pointermove",function(e){
      if(dragging){
        const dx=e.clientX-lx, dy=e.clientY-ly; moved+=Math.abs(dx)+Math.abs(dy);
        cam.yaw-=dx*0.0045; cam.pitch-=dy*0.0045; cam.pitch=THREE.MathUtils.clamp(cam.pitch,-0.9,0.6);
        lx=e.clientX; ly=e.clientY; return;
      }
      ndc.x=(e.clientX/window.innerWidth)*2-1; ndc.y=-(e.clientY/window.innerHeight)*2+1;
      ray.setFromCamera(ndc,camera);
      el.style.cursor = ray.intersectObjects(hitList(),false)[0] ? "pointer" : "default";
    });
    window.addEventListener("keydown",function(e){ keys[e.key.toLowerCase()]=true; });
    window.addEventListener("keyup",function(e){ keys[e.key.toLowerCase()]=false; });
    window.addEventListener("keydown",function(e){
      if(!arcade.active) return;
      var k=e.key.toLowerCase();
      if(k==="arrowup"||k==="arrowdown"||k==="arrowleft"||k==="arrowright"||k===" "||k==="spacebar") e.preventDefault();
      arcade.onKey(k);
    });
    window.addEventListener("resize",function(){
      camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
      if(cssRenderer) cssRenderer.setSize(window.innerWidth,window.innerHeight);
    });

    // ---------- loop ----------
    const clock=new THREE.Clock(); const SPEED=5; applyPower();
    function frame(){
      const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
      const lock=arcade.active;
      const fwd=lock?0:((keys["s"]||keys["arrowdown"]?1:0)-(keys["w"]||keys["arrowup"]?1:0));
      const str=lock?0:((keys["a"]||keys["arrowleft"]?1:0)-(keys["d"]||keys["arrowright"]?1:0));
      const s=Math.sin(cam.yaw), c=Math.cos(cam.yaw);
      player.x+=(fwd*-s+str*c)*SPEED*dt; player.z+=(fwd*-c-str*s)*SPEED*dt;
      player.x=THREE.MathUtils.clamp(player.x,-RW/2+1,RW/2-1);
      player.z=THREE.MathUtils.clamp(player.z,-RD/2+1,RD/2-1);
      camera.position.copy(player);
      camera.lookAt(
        player.x+Math.sin(cam.yaw)*Math.cos(cam.pitch),
        player.y+Math.sin(cam.pitch),
        player.z+Math.cos(cam.yaw)*Math.cos(cam.pitch)
      );
      if(RGB) RGB.material.color.setHSL((t*0.08)%1,0.8,0.6);
      tvGlow.intensity = power.tv ? 1.2+Math.sin(t*8)*0.08 : 0;
      drawScreen(t); drawWindow(dt); arcade.tick(dt);
      if(videoTex) videoTex.needsUpdate=true;
      renderer.render(scene,camera);
      if(cssRenderer) cssRenderer.render(cssScene,camera);
      requestAnimationFrame(frame);
    }
    renderer.render(scene,camera);
    document.getElementById("loader").classList.add("gone");
    requestAnimationFrame(frame);
  })();
  </script>
